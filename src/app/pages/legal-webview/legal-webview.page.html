<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" fill="clear" aria-label="Back">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ titleKey | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="legal-webview-content">
  <iframe
    *ngIf="hasUrl && iframeSrc"
    class="legal-frame"
    [src]="iframeSrc"
    [title]="titleKey | translate"
  ></iframe>

  <div *ngIf="!hasUrl" class="legal-placeholder">
    <p>{{ 'AUTH.mobileLogin.legalPlaceholder' | translate }}</p>
  </div>
</ion-content>
